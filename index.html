<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary Meta -->
    <title>Kraitin — AI-Powered Startup Intelligence</title>
    <meta name="description" content="Discover high-potential startup opportunities with AI. Research, validate, and launch your startup idea with Kraitin's AI-powered intelligence platform." />
    <meta name="keywords" content="startup ideas, startup research, market validation, AI startup tools, opportunity discovery, competitor analysis, MVP planning" />
    <meta name="author" content="Kraitin" />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://kraitin.com/" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://kraitin.com/" />
    <meta property="og:title" content="Kraitin — AI-Powered Startup Intelligence" />
    <meta property="og:description" content="Discover high-potential startup opportunities. Research, validate, and launch with AI-powered intelligence." />
    <meta property="og:image" content="https://kraitin.com/og-image.png" />
    <meta property="og:site_name" content="Kraitin" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@kraitin" />
    <meta name="twitter:title" content="Kraitin — AI-Powered Startup Intelligence" />
    <meta name="twitter:description" content="Discover high-potential startup opportunities. Research, validate, and launch with AI." />
    <meta name="twitter:image" content="https://kraitin.com/og-image.png" />

    <!-- Theme -->
    <meta name="theme-color" content="#000000" />
    <meta name="color-scheme" content="dark" />

    <!-- Content Security Policy -->
    <meta http-equiv="Content-Security-Policy" content="
      default-src 'self';
      script-src 'self' 'unsafe-inline' 'unsafe-eval' https://js.stripe.com https://challenges.cloudflare.com;
      style-src 'self' 'unsafe-inline' https://fonts.googleapis.com;
      font-src 'self' https://fonts.gstatic.com;
      img-src 'self' data: https: blob:;
      connect-src 'self' https://*.supabase.co wss://*.supabase.co https://js.stripe.com https://api.stripe.com https://challenges.cloudflare.com;
      frame-src https://js.stripe.com https://hooks.stripe.com https://challenges.cloudflare.com;
      object-src 'none';
      base-uri 'self';
      form-action 'self';
      upgrade-insecure-requests;
    " />
    <!-- Clickjacking protection (belt + suspenders: meta tag + CSP frame-ancestors via server header) -->
    <meta http-equiv="X-Frame-Options" content="DENY" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
