        },
        "query-input": "required name=search_term_string"
      }
    }
    </script>

    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [
        {
          "@type": "Question",
          "name": "What is Kraitin?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Kraitin is an AI-powered startup intelligence platform that helps founders discover validated startup opportunities, run deep market research, validate demand, analyze competitors, plan MVPs, and create launch strategies — all in one place."
          }
        },
        {
          "@type": "Question",
          "name": "How do I find a good startup idea?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Kraitin's Opportunity Discovery database contains 600+ AI-scored startup ideas ranked by market demand, growth rate, and competition level. Filter by category, growth velocity, or use the Hidden Gems filter to find high-potential, low-competition niches."
          }
        },
        {
          "@type": "Question",
          "name": "How does Kraitin validate startup ideas?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Kraitin's Validation Agent cross-references Reddit discussions, App Store reviews, competitor complaints, and search signals to surface real demand evidence. It returns a demand confidence score (0–100) along with actual user pain quotes and willingness-to-pay signals."
          }
        },
        {
          "@type": "Question",
          "name": "What AI agents does Kraitin offer?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Kraitin offers 7 AI agents: Research Agent (full market intelligence), Validation Agent (demand analysis), Competitor Intelligence (competitor dossier), MVP Planner (feature matrix + sprint plan), Launch Agent (go-to-market strategy), Blueprint Generator (complete startup blueprint), and Kira — your always-on AI cofounder advisor."
          }
        },
        {
          "@type": "Question",
          "name": "How much does Kraitin cost?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Kraitin offers a free tier with access to the opportunity discovery database. The Pro plan is $49/month (or $490/year) and includes all 7 AI agents, 500 monthly credits, workspace tools, saved reports, and watchlists. Cancel anytime."
          }
        },
        {
          "@type": "Question",
          "name": "Is Kraitin better than ChatGPT for startup research?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes, for startup-specific research. Unlike general AI tools, Kraitin is purpose-built for founders — with scored opportunity databases, real demand signals from Reddit and App Stores, structured competitor dossiers, MoSCoW MVP frameworks, and tailored go-to-market playbooks. Everything is structured, saved, and actionable — not just a chat response."
          }
        }
      ]
    }
    </script>
